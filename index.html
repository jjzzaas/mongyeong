<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#020712" />
<title>夢境 : 잠든 세계</title>
<style>
:root{font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif;color:#eef7ff;background:#020712}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020712}body{overflow:hidden}.screen{position:relative;min-height:100dvh;display:flex;align-items:flex-end;justify-content:center;padding:7vh 6vw 11vh;isolation:isolate;background:radial-gradient(circle at 50% 25%,#163a56 0,#0a1727 36%,#02060d 100%)}.screen:before{content:'';position:absolute;inset:0;z-index:-2;background:linear-gradient(rgba(4,15,24,.08),rgba(0,0,0,.68))}.title{align-items:center;flex-direction:column;justify-content:center;text-align:center}.logo{font-family:serif;font-size:clamp(72px,18vw,180px);letter-spacing:.12em;text-shadow:0 0 18px #7ad7ff,0 0 60px #1f78aa}.subtitle{margin-top:12px;font-size:clamp(20px,5vw,34px);letter-spacing:.45em;color:#bde9ff}.start{margin-top:18vh;font-size:14px;letter-spacing:.15em;color:#dff6ff;animation:pulse 1.7s infinite}.version{position:absolute;left:18px;bottom:14px;font-size:12px;color:#80b7d0}.box{width:min(760px,100%);padding:22px 22px 26px;border:1px solid rgba(142,221,255,.3);border-radius:18px;background:rgba(3,13,24,.78);backdrop-filter:blur(12px);box-shadow:0 0 45px rgba(28,138,190,.16)}.speaker{font-weight:700;color:#8fe0ff;margin-bottom:10px}.text{font-size:clamp(17px,4.4vw,22px);line-height:1.85;word-break:keep-all}.black{align-items:center;background:#000}.black .box{background:transparent;border:0;box-shadow:none;text-align:center;font-family:serif;font-style:italic}.forest{background:radial-gradient(circle at 50% 12%,#5b8e8f 0,#1e4853 25%,#0b1a25 65%,#02060b 100%)}.battle{background:radial-gradient(circle at 55% 20%,#31576c 0,#111827 40%,#02040a 100%)}.status{align-items:center;background:radial-gradient(circle,#0d4c73 0,#06182a 38%,#01040a 75%)}.status .box{border-color:#68d3ff;box-shadow:0 0 30px #1485c8,inset 0 0 25px rgba(61,188,255,.15);text-align:center;color:#bcefff}.city{background:linear-gradient(#6fb4c8 0,#2f6076 24%,#12283a 58%,#050b13 100%)}.lobby{background:radial-gradient(circle at 50% 10%,#2a5777,#0a1726 45%,#02060c)}.choice{display:block;width:100%;margin-top:12px;padding:13px 15px;border:1px solid rgba(136,220,255,.38);border-radius:12px;background:rgba(8,33,51,.82);color:#eafbff}.hint{position:absolute;bottom:4.5vh;font-size:12px;color:#90b9cb;animation:pulse 1.7s infinite}@keyframes pulse{50%{opacity:.35}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const scenes=[
['black','', '……여기는 어디지?'],['black','', '아니.\n그보다 먼저—'],['black','', '나는 누구지?'],
['forest','', '눈을 뜨자, 푸른빛이 나뭇잎 사이로 흘러내렸다.\n흙과 바람, 젖은 나무 냄새까지 지나치게 선명했다.'],
['forest','', '기억은 비어 있었다.\n그런데 몸은 이곳을 알고 있는 듯 자연스럽게 일어섰다.'],
['forest','', '같은 나무를 두 번 지나친 것 같았다.\n처음부터 길 같은 건 없었던 걸까.'],
['battle','', '나뭇가지가 부러졌다.\n검은 형체가 안개 사이에서 몸을 일으켰다.'],
['battle','', '손을 뻗는 순간, 푸른 입자가 모여 검의 형태를 이루었다.\n생각할 틈도 없이 몸이 먼저 움직였다.'],
['status','', 'LEVEL UP\nLv. 1 → Lv. 2\n정신 에너지 운용 상승\n신체 반응 상승\n새로운 구현 가능성 감지\n\n전리품: 악몽의 정수 × 1'],
['forest','', '악몽은 검은 안개처럼 흩어졌다.\n그 자리에 푸른빛이 섞인 작은 결정 하나가 남았다.'],
['forest','', '승리의 감각은 짧았다.\n더 짙고 거대한 그림자가 숲을 찢으며 나타났다.'],
['battle','', '검이 튕겨 나갔다.\n차가운 발톱이 눈앞까지 다가온 순간— 푸른 섬광이 어둠을 갈랐다.'],
['forest','하루','움직일 수 있어요?'],['forest','하루','……다친 곳은요?'],
['forest','', '내민 손을 잡고 일어서는 순간 다리에 힘이 풀렸다.\n그녀가 반사적으로 나를 받아냈다. 머리카락이 뺨을 스치고 숨결이 가까워졌다.'],
['forest','하루','……괜찮아 보이진 않네요.'],
['forest','하루','혼자예요?', ['아마도.','기억이 없어.','당신은 누구지?']],
['forest','하루','그럼 여기 혼자 있으면 안 돼요.\n중앙도시까지 같이 가요.'],
['black','', '아무것도 기억하지 못한다.\n그런데 이상하게도, 그녀의 뒤를 따라가는 일만은 낯설지 않았다.'],
['city','', '숲의 끝에서 빛이 터졌다.\n안개 너머, 처음 보는 중앙도시가 오래전부터 나를 기다린 듯 서 있었다.'],
['city','하루','왜 그래요? 가요.\n혼자 두진 않을 테니까.'],
['lobby','', '중앙도시 메인 로비가 해금되었습니다.\n튜토리얼 완료.']
];
const app=document.getElementById('app');let i=-1;let lock=false;
function title(){app.innerHTML='<main class="screen title"><div class="logo">夢境</div><div class="subtitle">잠든 세계</div><div class="start">화면을 터치하여 시작</div><div class="version">Ver. 0.2</div></main>';app.firstElementChild.addEventListener('click',next,{once:true});}
function render(){const s=scenes[i],choices=s[3]||[];app.innerHTML=`<main class="screen ${s[0]}"><section class="box">${s[1]?`<div class="speaker">${s[1]}</div>`:''}<div class="text">${s[2].replace(/\n/g,'<br>')}</div>${choices.map(c=>`<button class="choice">${c}</button>`).join('')}</section><div class="hint">터치하여 계속</div><div class="version">Ver. 0.2</div></main>`;const main=app.firstElementChild;if(choices.length){main.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();next()}));}else{main.addEventListener('click',next);}}
function next(){if(lock)return;lock=true;setTimeout(()=>lock=false,180);i++;if(i>=scenes.length){i=scenes.length-1;return;}render();}
title();
</script>
</body>
</html>
