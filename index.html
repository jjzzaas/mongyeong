<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020712"><title>夢境 : 잠든 세계</title><style>:root{font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif;color:#eef7ff;background:#020712}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020712}body{overflow:hidden}.screen{position:relative;min-height:100dvh;display:flex;align-items:flex-end;justify-content:center;padding:7vh 6vw 11vh;opacity:0;transform:scale(1.01);animation:enter .65s ease forwards;transition:opacity .42s ease,transform .42s ease,filter .42s ease}.screen.leaving{opacity:0;transform:scale(.995);filter:blur(3px)}.title{align-items:center;flex-direction:column;justify-content:center;text-align:center;background:radial-gradient(circle at 50% 25%,#163a56 0,#0a1727 36%,#02060d 100%)}.logo{font-family:serif;font-size:clamp(72px,18vw,180px);letter-spacing:.12em;text-shadow:0 0 18px #7ad7ff,0 0 60px #1f78aa}.subtitle{margin-top:12px;font-size:clamp(20px,5vw,34px);letter-spacing:.45em;color:#bde9ff}.start{margin-top:18vh;font-size:14px;letter-spacing:.15em;animation:pulse 1.7s infinite}.version{position:absolute;left:18px;bottom:14px;font-size:12px;color:#80b7d0}.box{width:min(760px,100%);padding:22px 22px 26px;border:1px solid rgba(142,221,255,.3);border-radius:18px;background:rgba(3,13,24,.78);backdrop-filter:blur(12px);box-shadow:0 0 45px rgba(28,138,190,.16)}.speaker{font-weight:700;color:#8fe0ff;margin-bottom:10px}.text{font-size:clamp(17px,4.4vw,22px);line-height:1.85;word-break:keep-all}.black{align-items:center;background:#000}.black .box{background:transparent;border:0;box-shadow:none;text-align:center;font-family:serif;font-style:italic}.forest{background:radial-gradient(circle at 50% 10%,#5b8e8f,#1e4853 27%,#0b1a25 67%,#02060b)}.danger{background:radial-gradient(circle at 50% 15%,#49373d,#17151c 48%,#030408)}.status,.chapter{align-items:center;background:radial-gradient(circle,#0d4c73,#06182a 38%,#01040a 75%)}.status .box,.chapter .box{text-align:center;border-color:#68d3ff;box-shadow:0 0 30px #1485c8;color:#bcefff}.city{background:linear-gradient(#6fb4c8,#2f6076 25%,#12283a 60%,#050b13)}.gate{background:radial-gradient(circle at 50% 15%,#456a7b,#1a3342 40%,#071018)}.lobby{background:radial-gradient(circle at 50% 10%,#2a5777,#0a1726 45%,#02060c)}.hint{position:absolute;bottom:4.5vh;font-size:12px;color:#90b9cb;animation:pulse 1.7s infinite}.name-wrap{width:min(520px,100%);text-align:center}.name-input{width:100%;margin-top:22px;padding:15px;border:1px solid #68d3ff;border-radius:12px;background:rgba(5,22,35,.9);color:white;text-align:center;font-size:20px;outline:none}.confirm{margin-top:12px;padding:12px 28px;border:1px solid #68d3ff;border-radius:12px;background:#0b3852;color:white}.exp{margin-top:18px;height:12px;border-radius:999px;background:#0b2232;overflow:hidden}.exp span{display:block;height:100%;width:0;background:linear-gradient(90deg,#44b8ef,#bcefff);animation:fill 1.4s ease forwards}.chapter-title{font-size:clamp(30px,9vw,54px);font-weight:800;letter-spacing:.12em}.chapter-sub{margin-top:14px;font-size:18px;letter-spacing:.2em}@keyframes enter{to{opacity:1;transform:scale(1)}}@keyframes pulse{50%{opacity:.35}}@keyframes fill{to{width:100%}}</style></head><body><div id="app"></div><script>const app=document.getElementById('app');let i=-1,locked=false,playerName='여행자';const scenes=[{type:'chapter',opening:true},{type:'black',text:'……여기는 어디지?'},{type:'black',text:'아니.\n그보다 먼저—'},{type:'black',text:'나는 누구지?'},{type:'name'},{type:'black',dynamic:()=>`그래.\n내 이름은 ${playerName}.`},{type:'black',text:'그것만은 기억난다.\n그런데 왜 여기 있는지는…… 모르겠다.'},{type:'forest',text:'눈을 뜨자 가장 먼저 빛이 보였다.\n푸른빛이 높은 나뭇잎 사이를 비집고 내려와 숲바닥에 조각조각 흩어져 있었다.'},{type:'forest',text:'천천히 몸을 일으켰다.\n축축한 흙냄새. 서늘한 바람. 이름 모를 꽃들이 발목 높이에서 흔들렸다.'},{type:'forest',text:'나무는 하늘을 가릴 만큼 높았다.\n잎 끝에는 작은 빛들이 맺혀 있었고, 바람이 불 때마다 허공으로 흩어졌다.'},{type:'forest',text:'아름답다.\n그런데 너무 조용했다.'},{type:'forest',text:'새소리도 없고, 벌레 우는 소리도 없다.\n내 발이 풀잎을 밟는 소리만 따라왔다.'},{type:'forest',text:'가만히 있을 수는 없었다.\n일단 이 숲을 벗어나기로 했다.'},{type:'forest',text:'얼마나 걸었을까.\n앞쪽 덤불에서 바스락거리는 소리가 났다.'},{type:'danger',text:'걸음을 멈췄다.\n검은 무언가가 나무 뒤에서 천천히 몸을 드러냈다.'},{type:'danger',text:'짐승처럼 네 발로 서 있었지만, 짐승이라고 하기엔 이상했다.\n몸의 윤곽은 연기처럼 계속 흔들리고 있었다.'},{type:'danger',text:'급히 주변을 둘러봤다.\n돌멩이 몇 개와 젖은 나뭇가지뿐. 손에 쥘 만한 건 아무것도 없었다.'},{type:'black',text:'……도망쳐야 한다.'},{type:'danger',text:'뒤돌아 달렸다.\n나뭇가지가 얼굴을 스쳤고, 바로 뒤에서 거친 숨소리가 따라붙었다.'},{type:'danger',text:'점점 가까워진다.\n뒤를 돌아볼 여유도 없었다.'},{type:'forest',text:'그 순간, 누군가 내 손목을 거칠게 잡아당겼다.'},{type:'forest',text:'몸이 옆으로 휘청였다.\n검은 발톱이 방금까지 내가 있던 자리를 찢고 지나갔다.'},{type:'forest',speaker:'???',text:'가만히 계세요.'},{type:'forest',text:'처음 보는 소녀였다.\n나를 등 뒤로 밀어낸 그녀가 한 손을 들어 올렸다.'},{type:'forest',text:'푸른빛이 손끝에 모이더니 활의 형태를 만들었다.\n시위를 당기자 빛으로 된 화살이 조용히 나타났다.'},{type:'danger',text:'화살이 연달아 날아갔다.\n검은 생명체가 비명을 지르며 뒤로 밀려났다.'},{type:'danger',text:'하지만 끝난 줄 알았던 순간, 놈이 몸을 낮추더니 소녀에게 달려들었다.'},{type:'black',text:'위험해.'},{type:'danger',text:'생각할 틈도 없이 달려들었다.\n주먹을 꽉 쥐고, 놈의 옆구리를 있는 힘껏 내질렀다.'},{type:'danger',text:'주먹이 닿은 순간—\n검은 몸이 안쪽부터 갈라지며 무너져 내렸다.'},{type:'danger',text:'검은 생명체는 몇 걸음 비틀거리더니 그대로 바닥에 쓰러졌다.\n움직임이 멎었다.'},{type:'forest',text:'순간, 숲이 조용해졌다.\n나는 천천히 주먹을 내려다봤다.'},{type:'forest',text:'소녀도 쓰러진 생명체와 나를 번갈아 바라보고 있었다.\n아무 말도 하지 못한 채.'},{type:'status',text:'LEVEL UP\nLv. 1 → Lv. 2\n\n신체 능력 상승\n정신 에너지 상승'},{type:'forest',speaker:'???',text:'……방금, 뭘 하신 거예요?'},{type:'forest',speaker:()=>playerName,text:'저도…… 모르겠습니다.'},{type:'forest',speaker:'???',text:'맨손으로 잡으셨잖아요.'},{type:'forest',speaker:()=>playerName,text:'그냥 달려들길래…… 저도 모르게.'},{type:'forest',text:'검은 안개가 흩어진 자리에 작은 결정 하나가 떨어졌다.\n검붉은빛이 결정 안쪽에서 희미하게 일렁였다.'},{type:'forest',speaker:'???',text:'악몽의 정수네요.'},{type:'forest',speaker:()=>playerName,text:'악몽……이요?'},{type:'forest',speaker:'???',text:'아까 그 괴물 말이에요.\n그런데 정말 아무것도 모르세요?'},{type:'forest',speaker:()=>playerName,text:'네. 이름 말고는 기억나는 게 없습니다.'},{type:'forest',speaker:'???',text:'……그렇군요.'},{type:'forest',speaker:'하루',text:'저는 하루예요.\n임무를 마치고 돌아가던 중이었어요.'},{type:'forest',speaker:'하루',text:'일단 같이 가요.\n이 숲에 혼자 계시는 건 위험해요.'},{type:'forest',speaker:()=>playerName,text:'도와주셔서 감사합니다.\n부탁드리겠습니다.'},{type:'black',text:'그렇게 나는 하루라는 헌터를 따라 숲을 나섰다.'},{type:'forest',text:'얼마쯤 걸었을까.\n빽빽하던 나무 사이로 조금씩 하늘이 보이기 시작했다.'},{type:'forest',text:'숲의 끝을 지나자 바람의 냄새가 달라졌다.\n그리고 멀리, 거대한 도시의 외벽이 모습을 드러냈다.'},{type:'city',text:'높은 외벽 너머로 수많은 건물과 불빛이 보였다.\n도시 바깥쪽에서는 무기를 든 헌터들이 외곽을 순찰하고 있었다.'},{type:'gate',text:'입구에 가까워지자 경계 중이던 두 헌터가 우리 쪽을 돌아봤다.\n그중 한 명이 하루를 알아보고 먼저 손을 들었다.'},{type:'gate',speaker:'헌터 1',text:'하루 씨. 오늘은 좀 늦으셨네요.'},{type:'gate',speaker:'하루',text:'네. 돌아오는 길에 일이 좀 있었어요.'},{type:'gate',speaker:'헌터 2',text:'옆에 계신 분 때문에요?'},{type:'gate',speaker:'하루',text:'네. 자세한 건 들어가서 얘기할게요.'},{type:'gate',speaker:'헌터 1',text:'알겠습니다. 고생하셨어요.'},{type:'gate',speaker:'하루',text:'두 분도 수고하세요.'},{type:'city',text:'하루와 함께 입구를 지나 도시 안으로 들어섰다.\n숲과는 전혀 다른 소리와 빛이 한꺼번에 밀려왔다.'},{type:'chapter',chapter:true},{type:'chapter',exp:true},{type:'status',text:'LEVEL UP\nLv. 2 → Lv. 3'},{type:'city',speaker:'하루',text:'중앙도시예요.\n여기까지 오셨으면 이제 괜찮을 거예요.'},{type:'lobby',text:'메인 로비가 해금되었습니다.'}];function mount(html,onReady){const old=app.firstElementChild;if(old){old.classList.add('leaving');setTimeout(()=>{app.innerHTML=html;onReady&&onReady()},420)}else{app.innerHTML=html;onReady&&onReady()}}function title(){mount('<main class="screen title"><div class="logo">夢境</div><div class="subtitle">잠든 세계</div><div class="start">화면을 터치하여 시작</div><div class="version">Ver. 0.6</div></main>',()=>app.firstElementChild.addEventListener('click',next,{once:true}))}function renderName(){mount('<main class="screen black"><div class="name-wrap"><div class="text">내 이름은—</div><input id="name" class="name-input" maxlength="10" placeholder="이름을 입력하세요"><button id="confirm" class="confirm">확인</button></div><div class="version">Ver. 0.6</div></main>',()=>{const input=document.getElementById('name');input.focus();const go=()=>{const v=input.value.trim();if(!v)return;playerName=v;next()};document.getElementById('confirm').onclick=go;input.addEventListener('keydown',e=>{if(e.key==='Enter')go()})})}function renderScene(s){if(s.opening){mount('<main class="screen chapter"><section class="box"><div class="chapter-title">CHAPTER 1</div></section><div class="hint">터치하여 계속</div><div class="version">Ver. 0.6</div></main>',()=>app.firstElementChild.onclick=next);return}if(s.chapter){mount('<main class="screen chapter"><section class="box"><div class="chapter-title">CHAPTER 1 CLEAR</div></section><div class="hint">터치하여 계속</div><div class="version">Ver. 0.6</div></main>',()=>app.firstElementChild.onclick=next);return}if(s.exp){mount('<main class="screen chapter"><section class="box"><div class="chapter-sub">CHAPTER CLEAR REWARD</div><div class="text" style="margin-top:18px">경험치 획득<br>EXP +100</div><div class="exp"><span></span></div></section><div class="hint">터치하여 계속</div><div class="version">Ver. 0.6</div></main>',()=>app.firstElementChild.onclick=next);return}const speaker=typeof s.speaker==='function'?s.speaker():s.speaker;const body=s.dynamic?.()||s.text;mount(`<main class="screen ${s.type}"><section class="box">${speaker?`<div class="speaker">${speaker}</div>`:''}<div class="text">${body.replace(/\n/g,'<br>')}</div></section><div class="hint">터치하여 계속</div><div class="version">Ver. 0.6</div></main>`,()=>app.firstElementChild.onclick=next)}function next(){if(locked)return;locked=true;setTimeout(()=>locked=false,480);i++;if(i>=scenes.length){i=scenes.length-1;return}const s=scenes[i];if(s.type==='name')renderName();else renderScene(s)}title();</script></body></html>
