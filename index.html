<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#030504" />
  <title>Project LIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260711-2" />
</head>
<body>
  <main class="game" aria-live="polite">
    <section class="title-screen" id="title-screen">
      <div class="title-aura"></div>
      <p class="title-kicker">AI COMPANION ACTION RPG</p>
      <h1>PROJECT <span>LIA</span></h1>
      <p class="loading-text">세계와의 연결을 복구하는 중</p>
      <div class="loading-bar"><i></i></div>
    </section>

    <section class="opening-screen" id="opening-screen" aria-hidden="true">
      <div class="forest" id="forest" aria-hidden="true">
        <div class="sky"></div>
        <div class="sunlight light-one"></div>
        <div class="sunlight light-two"></div>
        <div class="mist mist-one"></div>
        <div class="mist mist-two"></div>
        <div class="tree tree-left"><i></i><b></b></div>
        <div class="tree tree-mid"><i></i><b></b></div>
        <div class="tree tree-right"><i></i><b></b></div>
        <div class="canopy canopy-one"></div>
        <div class="canopy canopy-two"></div>
        <div class="canopy canopy-three"></div>
        <div class="ground"></div>
        <div class="leaf leaf-a"></div>
        <div class="leaf leaf-b"></div>
        <div class="leaf leaf-c"></div>
      </div>

      <div class="blackout" id="blackout"></div>

      <div class="narration" id="narration">
        <p class="narration-line" data-delay="0">어디선가, 잎사귀가 서로 스치는 소리가 들려온다.</p>
        <p class="narration-line" data-delay="1">울창한 숲 사이로 바람이 지나고, 푸른 향기가 천천히 번진다.</p>
        <p class="narration-line" data-delay="2">눈꺼풀 너머로 따뜻한 햇살이 스며든다.</p>
        <p class="narration-line emphasis" data-delay="3">나는, 서서히 눈을 떴다.</p>
      </div>

      <section class="dialogue-box" id="dialogue-box" aria-hidden="true">
        <div class="speaker">PLAYER</div>
        <p class="dialogue-text" id="dialogue-text"></p>
        <button class="next-button" id="next-button" type="button" aria-label="다음">⌄</button>
      </section>

      <button class="skip-button" id="skip-button" type="button">SKIP</button>
    </section>
  </main>

  <script src="script.js?v=20260711-2"></script>
</body>
</html>
