<svg xmlns="http://www.w3.org/2000/svg" width="480" height="900" viewBox="0 0 480 900" role="img" aria-label="하루 기본 전신 스프라이트">
  <defs>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#dbeaff"/>
      <stop offset="1" stop-color="#8fc9ff"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bcecff"/>
      <stop offset="0.55" stop-color="#5fc7ff"/>
      <stop offset="1" stop-color="#2079c8"/>
    </linearGradient>
    <radialGradient id="skin" cx="45%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fff3ee"/>
      <stop offset="1" stop-color="#efc4b8"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- long hair behind body -->
    <path d="M115 210C72 300 75 560 132 720C160 800 202 817 224 764C186 623 191 381 215 220Z" fill="url(#hair)" stroke="#6e9aca" stroke-width="5"/>
    <path d="M365 210C408 300 405 560 348 720C320 800 278 817 256 764C294 623 289 381 265 220Z" fill="url(#hair)" stroke="#6e9aca" stroke-width="5"/>

    <!-- legs -->
    <path d="M190 590L229 590L220 817C218 851 175 851 176 815Z" fill="url(#skin)" stroke="#d69f97" stroke-width="4"/>
    <path d="M251 590L290 590L304 815C306 851 263 851 260 817Z" fill="url(#skin)" stroke="#d69f97" stroke-width="4"/>

    <!-- shoes -->
    <path d="M166 806C184 793 210 793 224 810L225 856C202 876 159 871 151 850Z" fill="#eaf6ff" stroke="#4d82b4" stroke-width="5"/>
    <path d="M256 810C270 793 296 793 314 806L329 850C321 871 278 876 255 856Z" fill="#eaf6ff" stroke="#4d82b4" stroke-width="5"/>
    <path d="M167 823L220 826M163 840L221 842M260 826L313 823M259 842L317 840" stroke="#6ea4d5" stroke-width="5"/>

    <!-- shorts -->
    <path d="M164 514C191 499 289 499 316 514L301 628L245 628L240 571L235 628L179 628Z" fill="#f8fbff" stroke="#6f92b8" stroke-width="5"/>
    <path d="M240 516V571M179 548L229 554M251 554L301 548" stroke="#a5bdd6" stroke-width="4"/>
    <rect x="207" y="507" width="66" height="18" rx="7" fill="#8b9fb7"/>
    <rect x="226" y="506" width="28" height="21" rx="4" fill="#e6f2ff" stroke="#6685a7" stroke-width="4"/>

    <!-- torso/top -->
    <path d="M179 327C197 306 283 306 301 327L294 521C268 535 212 535 186 521Z" fill="#ffffff" stroke="#789ec6" stroke-width="5"/>
    <path d="M190 327L240 390L290 327" fill="#d5f1ff" stroke="#4a9dd4" stroke-width="5"/>
    <path d="M240 384L211 423L240 459L269 423Z" fill="#50bfff" stroke="#267fbd" stroke-width="5"/>

    <!-- coat body -->
    <path d="M165 317C131 340 112 431 118 575L184 610L200 478L194 329Z" fill="url(#coat)" stroke="#286fae" stroke-width="6"/>
    <path d="M315 317C349 340 368 431 362 575L296 610L280 478L286 329Z" fill="url(#coat)" stroke="#286fae" stroke-width="6"/>

    <!-- arms -->
    <path d="M145 345C109 365 88 469 114 523C128 553 163 539 164 510L176 384Z" fill="url(#coat)" stroke="#286fae" stroke-width="6"/>
    <path d="M335 345C371 365 392 469 366 523C352 553 317 539 316 510L304 384Z" fill="url(#coat)" stroke="#286fae" stroke-width="6"/>
    <ellipse cx="132" cy="532" rx="25" ry="31" fill="url(#skin)" stroke="#d69f97" stroke-width="4"/>
    <ellipse cx="348" cy="532" rx="25" ry="31" fill="url(#skin)" stroke="#d69f97" stroke-width="4"/>

    <!-- neck -->
    <rect x="218" y="270" width="44" height="65" rx="20" fill="url(#skin)" stroke="#d69f97" stroke-width="4"/>

    <!-- head -->
    <ellipse cx="240" cy="205" rx="105" ry="112" fill="url(#skin)" stroke="#d69f97" stroke-width="5"/>

    <!-- hair cap and bangs -->
    <path d="M136 206C129 89 201 55 242 59C306 50 358 110 344 225C324 171 295 136 241 125C190 136 160 167 136 206Z" fill="url(#hair)" stroke="#6e9aca" stroke-width="5"/>
    <path d="M143 176C167 91 218 79 240 82C286 76 326 114 341 178C310 145 279 132 241 126C200 132 172 146 143 176Z" fill="url(#hair)"/>
    <path d="M171 113C177 179 195 219 216 246C205 175 214 123 222 87Z" fill="url(#hair)" stroke="#6e9aca" stroke-width="4"/>
    <path d="M309 113C303 179 285 219 264 246C275 175 266 123 258 87Z" fill="url(#hair)" stroke="#6e9aca" stroke-width="4"/>
    <path d="M222 79C229 134 237 171 239 208C254 168 260 125 258 78Z" fill="url(#hair)" stroke="#6e9aca" stroke-width="4"/>

    <!-- blue ribbon -->
    <path d="M147 100L92 66L103 132L160 151Z" fill="#48bfff" stroke="#267fbd" stroke-width="5"/>
    <path d="M333 100L388 66L377 132L320 151Z" fill="#48bfff" stroke="#267fbd" stroke-width="5"/>

    <!-- eyes -->
    <ellipse cx="198" cy="211" rx="22" ry="17" fill="#ffffff"/>
    <ellipse cx="282" cy="211" rx="22" ry="17" fill="#ffffff"/>
    <ellipse cx="199" cy="213" rx="11" ry="15" fill="#2daeff" stroke="#1768a0" stroke-width="3"/>
    <ellipse cx="281" cy="213" rx="11" ry="15" fill="#2daeff" stroke="#1768a0" stroke-width="3"/>
    <circle cx="202" cy="208" r="4" fill="#ffffff"/>
    <circle cx="284" cy="208" r="4" fill="#ffffff"/>
    <path d="M176 194Q198 180 219 194M261 194Q282 180 304 194" fill="none" stroke="#53677e" stroke-width="6" stroke-linecap="round"/>

    <!-- face -->
    <path d="M239 219L233 246L244 248" fill="none" stroke="#d49f98" stroke-width="3" stroke-linecap="round"/>
    <path d="M222 271Q240 281 258 271" fill="none" stroke="#b66f79" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="172" cy="245" rx="18" ry="8" fill="#f0aab1" opacity="0.35"/>
    <ellipse cx="308" cy="245" rx="18" ry="8" fill="#f0aab1" opacity="0.35"/>
  </g>
</svg>